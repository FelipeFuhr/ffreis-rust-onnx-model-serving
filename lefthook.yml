pre-commit:
  parallel: true
  commands:
    rustfmt:
      glob: "app/**/*.rs"
      run: make -C app fmt

    lint:
      glob: "app/**/*.rs"
      run: make -C app lint

    hygiene:
      run: |
        if grep -R --line-number --binary-files=without-match \
          --exclude-dir=.git --exclude-dir=target --exclude-dir=build --exclude-dir=coverage \
          --exclude=lefthook.yml \
          -E '^(<<<<<<<|=======|>>>>>>>)' .; then
          echo "Merge conflict markers found"
          exit 1
        fi

pre-push:
  parallel: false
  commands:
    unit-tests:
      run: make -C app test-unit

    integration-tests:
      run: make -C app test-integration

    e2e-tests:
      run: make -C app test-e2e

    e2e-min-scenarios:
      run: make -C app check-e2e-min E2E_MIN_TESTS=3

    coverage-segments:
      run: make -C app coverage-segment-check INTEGRATION_COVERAGE_MIN=57 E2E_COVERAGE_MIN=48
