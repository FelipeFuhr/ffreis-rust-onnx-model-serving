pre-commit:
  parallel: true
  commands:
    rustfmt:
      glob: "app/**/*.rs"
      run: make -C app fmt

    lint:
      glob: "app/**/*.rs"
      run: make -C app lint

    hygiene:
      run: |
        if grep -R --line-number --binary-files=without-match \
          --exclude-dir=.git --exclude-dir=target --exclude-dir=build --exclude-dir=coverage \
          --exclude=lefthook.yml \
          -E '^(<<<<<<<|=======|>>>>>>>)' .; then
          echo "Merge conflict markers found"
          exit 1
        fi

pre-push:
  parallel: false
  commands:
    quality-gates:
      run: make -C app prepush-check INTEGRATION_COVERAGE_MIN=57 E2E_COVERAGE_MIN=45 E2E_MIN_TESTS=3
